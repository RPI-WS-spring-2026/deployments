services:
  app:
    build: ./react-nextjs-mongo
    ports:
      - "3003:3003"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/todoapp
      - NODE_ENV=development
    volumes:
      - ./react-nextjs-mongo/src:/app/src
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
