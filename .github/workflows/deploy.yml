# =============================================================================
# Deploy Workflow — CI/CD Deployment Exercise
# =============================================================================
# This workflow runs on pushes to main. It:
#   1. Tests the code (lint)
#   2. Builds a Docker image
#   3. Pushes the image to Amazon ECR
#   4. Triggers a rolling deployment on Amazon ECS Fargate
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   - AWS_ACCESS_KEY_ID      (from IAM user 'github-actions-deployer')
#   - AWS_SECRET_ACCESS_KEY  (from IAM user 'github-actions-deployer')
#   - AWS_ACCOUNT_ID         (your 12-digit AWS account ID)
#   - AWS_REGION             (e.g. us-east-1, us-east-2)
#   - ECR_REPOSITORY         (e.g. todo-app)
#   - ECS_CLUSTER            (e.g. todo-app)
#   - ECS_SERVICE            (e.g. todo-app)
#   - MONGODB_URI            (MongoDB Atlas connection string)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Test — gate deployment on code quality + unit tests
  # Only lint + unit tests here (fast). Full integration/E2E tests run in ci.yml.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install
        working-directory: ./react-nextjs-mongo

      - name: Run linter
        run: npm run lint
        working-directory: ./react-nextjs-mongo

      - name: Run unit tests
        run: npm run test:unit
        working-directory: ./react-nextjs-mongo

  # ---------------------------------------------------------------------------
  # Job 2: Deploy — build image, push to ECR, deploy to ECS
  # Only runs after tests pass and only on the main branch
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate with AWS using IAM user credentials stored in GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Get a temporary Docker login token for ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image and push it to ECR with two tags:
      #   1. The git commit SHA (for traceability and rollback)
      #   2. "latest" (what the ECS task definition references)
      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./react-nextjs-mongo
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushing to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✓ Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      # Tell ECS to pull the latest image and perform a rolling deployment.
      # --force-new-deployment makes ECS start new tasks even if the task
      # definition hasn't changed (because we pushed a new :latest image).
      - name: Deploy to ECS
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          echo "Triggering ECS rolling deployment..."
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment

          echo "✓ Deployment triggered. ECS will:"
          echo "  1. Start new task(s) with the latest image"
          echo "  2. Wait for health checks to pass"
          echo "  3. Stop old task(s)"
          echo "  Check the ECS console for status."
